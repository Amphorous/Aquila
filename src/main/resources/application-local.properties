spring.data.redis.host=philia.home

# The base application.properties redirect-uri falls back to the frontend's own port
# (5173) when APPLICATION_FRONTEND_URL_HSR isn't set, which is wrong for the OAuth2
# callback — that must land back on Aquila itself, not on Vite. Overriding here (local
# profile only) so the orexis/prod config in application.properties stays untouched.
spring.security.oauth2.client.registration.discord.redirect-uri=http://localhost:8080/login/oauth2/code/{registrationId}
