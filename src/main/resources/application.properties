application.title=aquila
application.version=1.0.0

# Basic Application Settings
spring.application.name=aquila
server.port=8080

# Eureka Client Configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Delta-me13 route
spring.cloud.gateway.server.webflux.routes[0].id=delta-me13-route
spring.cloud.gateway.server.webflux.routes[0].uri=lb://delta-me13
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/delta/**

# Translator route
spring.cloud.gateway.server.webflux.routes[1].id=translator-route
spring.cloud.gateway.server.webflux.routes[1].uri=lb://translator
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/translator/**

# --- Reactive Retry Filter ---
spring.cloud.gateway.server.webflux.routes[0].filters[0].name=Retry
spring.cloud.gateway.server.webflux.routes[0].filters[0].args.retries=3
spring.cloud.gateway.server.webflux.routes[0].filters[0].args.statuses=BAD_GATEWAY,GATEWAY_TIMEOUT,INTERNAL_SERVER_ERROR

# --- Resilience4j Circuit Breaker Filter ---
spring.cloud.gateway.server.webflux.routes[0].filters[1].name=CircuitBreaker
spring.cloud.gateway.server.webflux.routes[0].filters[1].args.name=aquilaCircuitBreaker

# --- Strip Prefix Filter ---
# Removes the first part of the path (/delta) before sending to delta-me13
spring.cloud.gateway.server.webflux.routes[0].filters[2].name=StripPrefix
spring.cloud.gateway.server.webflux.routes[0].filters[2].args.parts=1

# --- Built-in Reactive Retry Filter ---
spring.cloud.gateway.server.webflux.routes[1].filters[0].name=Retry
spring.cloud.gateway.server.webflux.routes[1].filters[0].args.retries=3
spring.cloud.gateway.server.webflux.routes[1].filters[0].args.statuses=BAD_GATEWAY,GATEWAY_TIMEOUT,INTERNAL_SERVER_ERROR

# --- Resilience4j Circuit Breaker Filter ---
spring.cloud.gateway.server.webflux.routes[1].filters[1].name=CircuitBreaker
spring.cloud.gateway.server.webflux.routes[1].filters[1].args.name=aquilaCircuitBreaker

# --- Strip Prefix Filter ---
# Removes the first part of the path (/translator) before sending to translator
spring.cloud.gateway.server.webflux.routes[1].filters[2].name=StripPrefix
spring.cloud.gateway.server.webflux.routes[1].filters[2].args.parts=1

# Enables Caffeine caching for the LoadBalancer (lb://)
# (These remain unchanged because they belong to the LoadBalancer/Cache modules)
spring.cloud.loadbalancer.cache.enabled=true
spring.cache.type=caffeine

# Improves compatibility with case-sensitive service IDs
spring.cloud.gateway.server.webflux.discovery.locator.lower-case-service-id=true

# Resilience4J Configuration Details
# (These remain unchanged because they belong to Resilience4j directly)
resilience4j.circuitbreaker.instances.aquilaCircuitBreaker.sliding-window-size=10
resilience4j.circuitbreaker.instances.aquilaCircuitBreaker.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.aquilaCircuitBreaker.wait-duration-in-open-state=10s
resilience4j.timelimiter.instances.aquilaCircuitBreaker.timeout-duration=3s

#hsr frontend url config
application.frontend-url.hsr=http://localhost:5173
application.login-failure-url.hsr=http://localhost:5173
application.login-success-url.hsr=http://localhost:5173

#le Disc login connection lin mayhaps? replace for production phase this is dev only
